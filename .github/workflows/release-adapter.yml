name: Release Adapter

on:
  push:
    tags:
      - "adapter/v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. adapter/v0.1.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-adapter
  cancel-in-progress: false

# Migrated from bbclaw-reference 2026-04-27 (ADR-011). Now that adapter source
# lives in this repo, the cross-publish step that previously copied binaries
# from bbclaw-reference → daboluocc/bbclaw is no longer needed: the release
# is created here directly, and scripts/install-adapter.sh already points at
# this repo.

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    defaults:
      run:
        working-directory: adapter
    env:
      RELEASE_VERSION: ${{ github.event.inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: adapter/go.mod
          cache-dependency-path: adapter/go.sum

      - name: Run adapter tests
        run: go test ./...

      - name: Build release archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          BBCLAW_BUILD_TAG: ${{ env.RELEASE_VERSION }}
        run: |
          set -euo pipefail
          archive="$(./scripts/release_build.sh "$RELEASE_VERSION")"
          echo "ARCHIVE_PATH=$archive" >> "$GITHUB_ENV"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: adapter-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            adapter/dist/bbclaw-adapter_*
            adapter/dist/bbclaw-adapter-*

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    env:
      RELEASE_VERSION: ${{ github.event.inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Download archives
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: adapter-*
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-artifacts
          shasum -a 256 * > SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: ${{ env.RELEASE_VERSION }}
          generate_release_notes: true
          files: |
            release-artifacts/*
