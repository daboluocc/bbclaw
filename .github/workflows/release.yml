name: Release (firmware + adapter)

# 一个 tag → 一个 release，固件和 adapter 一起发布。
#
# 触发：push 一个形如 v0.4.1 的 tag。
# 产物：
#   - GitHub Release (含固件 .bin + adapter 5 平台 binary + SHA256SUMS)
#   - 固件 .bin POST 到 OTA server（设备会自动拉取这个版本）
#
# 历史背景：之前是两个独立 workflow（firmware-release.yml 和
# release-adapter.yml + 闭源仓 cross-publish）。adapter 开源迁回本仓后
# 合并成一个发布管道（ADR-011 的 "立即行动" 第 5 项）。

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag, e.g. v0.4.1'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # ───────────────────────────────────────────────────────────────────────
  # Firmware (single ESP32-S3 .bin)
  # ───────────────────────────────────────────────────────────────────────
  build-firmware:
    name: Build firmware (esp32s3)
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ github.event.inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install ESP-IDF
        run: |
          git clone --depth 1 --recursive https://github.com/espressif/esp-idf.git ~/esp/esp-idf
          ~/esp/esp-idf/install.sh esp32s3

      - name: Build firmware
        env:
          IDF_PATH: ~/esp/esp-idf
        run: |
          source ~/esp/esp-idf/export.sh
          cd firmware
          make set-target BOARD=bbclaw
          make build

      - name: Stage firmware artifact
        run: |
          mkdir -p release-stage/firmware
          cp firmware/build/bbclaw_firmware.bin \
             "release-stage/firmware/bbclaw-firmware-${RELEASE_VERSION}-esp32s3.bin"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-bin
          path: release-stage/firmware/

      - name: Push firmware to OTA server
        env:
          OTA_KEY: ${{ secrets.OTA_ADMIN_KEY }}
          OTA_URL: ${{ vars.OTA_SERVER_URL }}
        run: |
          if [ -z "$OTA_KEY" ] || [ -z "$OTA_URL" ]; then
            echo "::warning::OTA_ADMIN_KEY / OTA_SERVER_URL not configured — skipping OTA push (release artifact still produced)"
            exit 0
          fi
          curl -fSs -X POST "$OTA_URL/v1/ota/firmware" \
            -H "X-OTA-Admin-Key: $OTA_KEY" \
            -F "version=${RELEASE_VERSION}" \
            -F "platform=esp32s3" \
            -F "releaseNotes=Firmware ${RELEASE_VERSION}" \
            -F "file=@firmware/build/bbclaw_firmware.bin"

  # ───────────────────────────────────────────────────────────────────────
  # Adapter (Go matrix: 5 platforms)
  # ───────────────────────────────────────────────────────────────────────
  build-adapter:
    name: Build adapter ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    defaults:
      run:
        working-directory: adapter
    env:
      RELEASE_VERSION: ${{ github.event.inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: adapter/go.mod
          cache-dependency-path: adapter/go.sum

      - name: Run adapter tests
        run: go test ./...

      - name: Build release archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          BBCLAW_BUILD_TAG: ${{ env.RELEASE_VERSION }}
        run: |
          set -euo pipefail
          ./scripts/release_build.sh "$RELEASE_VERSION" >/dev/null

      - name: Upload adapter artifacts
        uses: actions/upload-artifact@v4
        with:
          name: adapter-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            adapter/dist/bbclaw-adapter_*
            adapter/dist/bbclaw-adapter-*

  # ───────────────────────────────────────────────────────────────────────
  # Single GitHub Release with both
  # ───────────────────────────────────────────────────────────────────────
  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-firmware, build-adapter]
    env:
      RELEASE_VERSION: ${{ github.event.inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware-bin
          path: release-artifacts/

      - name: Download adapter artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/
          pattern: adapter-*
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-artifacts
          ls -la
          shasum -a 256 * > SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: ${{ env.RELEASE_VERSION }}
          generate_release_notes: true
          files: |
            release-artifacts/*
