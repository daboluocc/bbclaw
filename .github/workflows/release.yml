name: Release (firmware + adapter)

# 一个 tag → 一个 release，固件和 adapter 一起发布。
#
# 触发：push 一个形如 v0.4.1 的 tag。
# 产物：
#   - GitHub Release (含固件 .bin + adapter 5 平台 binary + SHA256SUMS)
#   - 固件 .bin POST 到 OTA server（设备会自动拉取这个版本）
#
# 历史背景：之前是两个独立 workflow（firmware-release.yml 和
# release-adapter.yml + 闭源仓 cross-publish）。adapter 开源迁回本仓后
# 合并成一个发布管道（ADR-011 的 "立即行动" 第 5 项）。

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag, e.g. v0.4.1'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # ───────────────────────────────────────────────────────────────────────
  # Firmware (single ESP32-S3 .bin)
  # ───────────────────────────────────────────────────────────────────────
  build-firmware:
    name: Build firmware (esp32s3)
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ github.event.inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install ESP-IDF v5.5
        # Pin to release/v5.5 branch — local dev runs on v5.5.2 (see CLAUDE.md).
        # ESP-IDF master (currently 6.1.0) dropped the legacy `json` component
        # which our `src/` REQUIRES, so unpinned clones break the build.
        run: |
          git clone --depth 1 --branch release/v5.5 --recursive https://github.com/espressif/esp-idf.git ~/esp/esp-idf
          ~/esp/esp-idf/install.sh esp32s3

      - name: Build firmware
        env:
          IDF_PATH: ~/esp/esp-idf
        run: |
          source ~/esp/esp-idf/export.sh
          cd firmware
          make set-target BOARD=bbclaw
          make build

      - name: Generate OTA data (ota_0 boot)
        # The default ota_data_initial.bin (all 0xFF) points to factory which
        # is too small for our 2.36 MB firmware.  Generate a custom otadata
        # that boots ota_0 (seq=1).  CRC matches IDF's bootloader_common_ota_select_crc.
        run: |
          python3 -c "
          import binascii, struct
          seq = 1
          label = b'\xff' * 20
          state = 0xFFFFFFFF
          crc = binascii.crc32(struct.pack('I', seq), 0xFFFFFFFF) % (1 << 32)
          entry = struct.pack('<I20sII', seq, label, state, crc)
          sec1 = entry + b'\xff' * (4096 - len(entry))
          sec2 = b'\xff' * 4096
          import os; os.makedirs('firmware/build', exist_ok=True)
          open('firmware/build/otadata_ota0.bin', 'wb').write(sec1 + sec2)
          print(f'[otadata] wrote otadata_ota0.bin (seq={seq} crc=0x{crc:08x} -> ota_0)')
          "

      - name: Stage firmware artifacts
        # Stage all four bins needed for first-time serial flashing (browser
        # / esptool flow) plus the app bin that single-app OTA already used.
        # Filenames are versioned so Release downloads are unambiguous.
        run: |
          mkdir -p release-stage/firmware
          cp firmware/build/bootloader/bootloader.bin \
             "release-stage/firmware/bootloader-${RELEASE_VERSION}.bin"
          cp firmware/build/partition_table/partition-table.bin \
             "release-stage/firmware/partition-table-${RELEASE_VERSION}.bin"
          cp firmware/build/otadata_ota0.bin \
             "release-stage/firmware/ota-data-${RELEASE_VERSION}.bin"
          cp firmware/build/bbclaw_firmware.bin \
             "release-stage/firmware/bbclaw-firmware-${RELEASE_VERSION}-esp32s3.bin"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-bin
          path: release-stage/firmware/

      - name: Push flash bundle to OTA server
        # Posts a multi-part flash bundle (bootloader + partition-table + otadata +
        # ota_0 app) to /v1/ota/flash-bundle.  The bundle is what the portal's
        # /flash page consumes via esp-web-tools.
        #
        # Offsets are from the BBClaw OTA partition layout (partitions_ota.csv):
        #   0x0      bootloader       ~21 KB
        #   0x8000   partition table    4 KB
        #   0x10000  otadata (o_0)      8 KB
        #   0x120000 ota_0 app         2.5 MB
        env:
          OTA_KEY: ${{ secrets.OTA_ADMIN_KEY }}
          OTA_URL: ${{ vars.OTA_SERVER_URL }}
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          set -euo pipefail
          if [ -z "$OTA_KEY" ] || [ -z "$OTA_URL" ]; then
            echo "::warning::OTA_ADMIN_KEY / OTA_SERVER_URL not configured — skipping OTA push (release artifact still produced)"
            exit 0
          fi

          STAGE="release-stage/firmware"

          PART_BOOT="bootloader-${RELEASE_VERSION}.bin"
          PART_PT="partition-table-${RELEASE_VERSION}.bin"
          PART_OTA="ota-data-${RELEASE_VERSION}.bin"
          PART_APP="bbclaw-firmware-${RELEASE_VERSION}-esp32s3.bin"

          # Verify staged files exist.
          for f in "$PART_BOOT" "$PART_PT" "$PART_OTA" "$PART_APP"; do
            [[ -f "$STAGE/$f" ]] || { echo "missing: $STAGE/$f"; exit 1; }
          done

          MANIFEST=$(jq -nc \
            --arg version "$RELEASE_VERSION" \
            --arg b "$PART_BOOT" \
            --arg p "$PART_PT" \
            --arg o "$PART_OTA" \
            --arg a "$PART_APP" \
            '{
              version: $version,
              platform: "esp32s3",
              chipFamily: "ESP32-S3",
              parts: [
                {offset: "0x0",       filename: $b},
                {offset: "0x8000",    filename: $p},
                {offset: "0x10000",   filename: $o},
                {offset: "0x120000",  filename: $a}
              ]
            }')

          echo "Manifest:"
          echo "$MANIFEST" | jq .

          curl -fSs -X POST "$OTA_URL/v1/ota/flash-bundle" \
            -H "X-OTA-Admin-Key: $OTA_KEY" \
            -F "manifest=$MANIFEST" \
            -F "${PART_BOOT}=@${STAGE}/${PART_BOOT}" \
            -F "${PART_PT}=@${STAGE}/${PART_PT}" \
            -F "${PART_OTA}=@${STAGE}/${PART_OTA}" \
            -F "${PART_APP}=@${STAGE}/${PART_APP}"
          echo "Flash bundle pushed: $RELEASE_VERSION"

  # ───────────────────────────────────────────────────────────────────────
  # Adapter (Go matrix: 5 platforms)
  # ───────────────────────────────────────────────────────────────────────
  build-adapter:
    name: Build adapter ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    defaults:
      run:
        working-directory: adapter
    env:
      RELEASE_VERSION: ${{ github.event.inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: adapter/go.mod
          cache-dependency-path: adapter/go.sum

      - name: Run adapter tests
        run: go test ./...

      - name: Build release archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          BBCLAW_BUILD_TAG: ${{ env.RELEASE_VERSION }}
        run: |
          set -euo pipefail
          ./scripts/release_build.sh "$RELEASE_VERSION" >/dev/null

      - name: Upload adapter artifacts
        uses: actions/upload-artifact@v4
        with:
          name: adapter-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            adapter/dist/bbclaw-adapter_*
            adapter/dist/bbclaw-adapter-*

  # ───────────────────────────────────────────────────────────────────────
  # Single GitHub Release with both
  # ───────────────────────────────────────────────────────────────────────
  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-firmware, build-adapter]
    env:
      RELEASE_VERSION: ${{ github.event.inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware-bin
          path: release-artifacts/

      - name: Download adapter artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/
          pattern: adapter-*
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-artifacts
          ls -la
          shasum -a 256 * > SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: ${{ env.RELEASE_VERSION }}
          generate_release_notes: true
          files: |
            release-artifacts/*
