name: Firmware OTA Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ESP-IDF
        run: |
          git clone --depth 1 --recursive https://github.com/espressif/esp-idf.git ~/esp/esp-idf
          ~/esp/esp-idf/install.sh esp32s3

      - name: Build firmware
        env:
          IDF_PATH: ~/esp/esp-idf
        run: |
          source ~/esp/esp-idf/export.sh
          cd firmware
          make set-target BOARD=bbclaw
          make build

      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Firmware version: $VERSION"

      - name: Upload to OTA server
        env:
          OTA_KEY: ${{ secrets.OTA_ADMIN_KEY }}
          OTA_URL: ${{ vars.OTA_SERVER_URL }}
        run: |
          if [ -z "$OTA_KEY" ]; then
            echo "OTA_ADMIN_KEY secret not configured"
            exit 1
          fi
          if [ -z "$OTA_URL" ]; then
            echo "OTA_SERVER_URL variable not configured"
            exit 1
          fi
          curl -X POST "$OTA_URL/v1/ota/firmware" \
            -H "X-OTA-Admin-Key: $OTA_KEY" \
            -F "version=${{ steps.version.outputs.VERSION }}" \
            -F "platform=esp32s3" \
            -F "releaseNotes=Firmware ${{ steps.version.outputs.VERSION }} release" \
            -F "file=@firmware/build/bbclaw_firmware.bin"
