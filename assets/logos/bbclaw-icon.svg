<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 天线（粗壮，对讲机灵魂） -->
  <rect x="28" y="1" width="6" height="16" rx="3" fill="#777"/>
  <rect x="29.5" y="1" width="3" height="16" rx="1.5" fill="#999"/>
  <!-- 天线顶部圆球 -->
  <circle cx="31" cy="2" r="2" fill="#aaa"/>

  <!-- 机身主体 -->
  <rect x="10" y="15" width="44" height="48" rx="6" fill="#1c1c1c"/>
  <rect x="10" y="15" width="44" height="48" rx="6" fill="none" stroke="#3a3a3a" stroke-width="1"/>

  <!-- 顶部信号指示灯条 -->
  <g fill="#2a2a2a">
    <rect x="13" y="18" width="4" height="3" rx="1"/>
    <rect x="19" y="18" width="4" height="3" rx="1"/>
    <rect x="25" y="18" width="4" height="3" rx="1"/>
  </g>
  <!-- 绿色信号灯 -->
  <rect x="13" y="18" width="4" height="3" rx="1" fill="#00cc44"/>
  <rect x="19" y="18" width="4" height="3" rx="1" fill="#00cc44" opacity="0.6"/>
  <rect x="25" y="18" width="4" height="3" rx="1" fill="#00cc44" opacity="0.3"/>

  <!-- 喇叭网（蜂窝状，对讲机核心元素） -->
  <g fill="#252525" stroke="#1a1a1a" stroke-width="0.3">
    <circle cx="20" cy="30" r="2.5"/>
    <circle cx="28" cy="30" r="2.5"/>
    <circle cx="36" cy="30" r="2.5"/>
    <circle cx="24" cy="35" r="2.5"/>
    <circle cx="32" cy="35" r="2.5"/>
    <circle cx="20" cy="40" r="2.5"/>
    <circle cx="28" cy="40" r="2.5"/>
    <circle cx="36" cy="40" r="2.5"/>
    <circle cx="24" cy="45" r="2.5"/>
    <circle cx="32" cy="45" r="2.5"/>
  </g>

  <!-- LED 发射灯（红色，对讲机灵魂） -->
  <circle cx="46" cy="30" r="5" fill="#1a0808"/>
  <circle cx="46" cy="30" r="3.5" fill="#ff2020" opacity="0.95"/>
  <circle cx="46" cy="30" r="1.8" fill="#ff8080"/>

  <!-- 发射时声波动画暗示 -->
  <g stroke="#ff4040" stroke-width="0.6" fill="none" opacity="0.5">
    <path d="M42 30 Q40 27 42 24"/>
    <path d="M50 30 Q52 27 50 24"/>
    <path d="M41 30 Q38 26 41 22"/>
    <path d="M51 30 Q54 26 51 22"/>
  </g>

  <!-- PTT 按键区域（对讲机灵魂，侧面大型按键） -->
  <rect x="42" y="40" width="10" height="16" rx="3" fill="#222" stroke="#444" stroke-width="0.8"/>
  <!-- PTT 按键本体 -->
  <rect x="43.5" y="42" width="7" height="12" rx="2" fill="#2e2e2e"/>
  <rect x="44" y="43" width="6" height="10" rx="1.5" fill="#ff3030" opacity="0.9"/>
  <!-- PTT 阴影线 -->
  <rect x="44" y="43" width="6" height="2" rx="1" fill="#ff6060" opacity="0.5"/>
  <!-- PTT 标识 -->
  <text x="47" y="52" font-family="Arial" font-size="3.5" font-weight="bold" fill="#ffcccc" text-anchor="middle">PTT</text>

  <!-- 频道旋钮 -->
  <circle cx="46" cy="52" r="3" fill="#333" stroke="#555" stroke-width="0.5"/>
  <circle cx="46" cy="52" r="1.5" fill="#222"/>
  <line x1="46" y1="49.5" x2="46" y2="51" stroke="#888" stroke-width="0.8"/>

  <!-- 音量/电源指示小点 -->
  <circle cx="13" cy="55" r="1.5" fill="#333"/>
  <circle cx="17" cy="55" r="1.5" fill="#333"/>
  <circle cx="21" cy="55" r="1.5" fill="#444"/>
</svg>
