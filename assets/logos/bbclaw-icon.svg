<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- BBClaw device icon: radio/对讲机外形 + pixel lobster accent -->
  <defs>
    <linearGradient id="body-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>

  <!-- Antenna -->
  <rect x="30" y="2" width="4" height="12" rx="2" fill="#444"/>
  <rect x="31" y="2" width="2" height="12" rx="1" fill="#666"/>

  <!-- Main body / 对讲机机身 -->
  <rect x="12" y="14" width="40" height="48" rx="6" fill="url(#body-grad)" stroke="#3a3a3a" stroke-width="1"/>

  <!-- Speaker grille -->
  <g fill="#444">
    <rect x="16" y="18" width="8" height="3" rx="1.5"/>
    <rect x="16" y="23" width="8" height="3" rx="1.5"/>
    <rect x="16" y="28" width="8" height="3" rx="1.5"/>
    <rect x="16" y="33" width="8" height="3" rx="1.5"/>
  </g>

  <!-- LED indicator -->
  <circle cx="36" cy="22" r="4" fill="#ff4f40" opacity="0.9"/>
  <circle cx="36" cy="22" r="2" fill="#ff8880"/>

  <!-- Display area -->
  <rect x="26" y="18" width="22" height="14" rx="2" fill="#0a1a0a"/>
  <rect x="27" y="19" width="20" height="12" rx="1.5" fill="#0f2f0f" opacity="0.6"/>

  <!-- Pixel lobster in display (tiny!) -->
  <g transform="translate(28, 20) scale(0.35)">
    <g fill="#ff4f40">
      <rect x="5" y="3" width="6" height="1"/>
      <rect x="4" y="4" width="8" height="1"/>
      <rect x="3" y="5" width="10" height="1"/>
      <rect x="3" y="6" width="10" height="1"/>
      <rect x="3" y="7" width="10" height="1"/>
      <rect x="4" y="8" width="8" height="1"/>
      <rect x="5" y="9" width="6" height="1"/>
      <rect x="5" y="12" width="6" height="1"/>
      <rect x="6" y="13" width="4" height="1"/>
    </g>
    <g fill="#ff775f">
      <rect x="1" y="6" width="2" height="1"/>
      <rect x="2" y="5" width="1" height="1"/>
      <rect x="2" y="7" width="1" height="1"/>
      <rect x="13" y="6" width="2" height="1"/>
      <rect x="13" y="5" width="1" height="1"/>
      <rect x="13" y="7" width="1" height="1"/>
    </g>
    <g fill="#081016">
      <rect x="6" y="5" width="1" height="1"/>
      <rect x="9" y="5" width="1" height="1"/>
    </g>
    <g fill="#f5fbff">
      <rect x="6" y="4" width="1" height="1"/>
      <rect x="9" y="4" width="1" height="1"/>
    </g>
  </g>

  <!-- PTT button (push-to-talk) -->
  <rect x="26" y="36" width="22" height="10" rx="3" fill="#3a3a3a" stroke="#555" stroke-width="0.5"/>
  <rect x="28" y="38" width="18" height="6" rx="2" fill="#ff4f40" opacity="0.8"/>

  <!-- Bottom detail -->
  <rect x="24" y="50" width="16" height="6" rx="2" fill="#333"/>
</svg>
