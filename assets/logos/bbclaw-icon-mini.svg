<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- 龙虾手拿 BB 机 — 最小版 32x32 pixel art style -->
  <!-- 龙虾头 -->
  <rect x="12" y="1" width="8" height="6" fill="#ff4f40"/>
  <rect x="10" y="7" width="12" height="7" fill="#ff4f40"/>
  <rect x="9" y="14" width="14" height="6" fill="#ff4f40"/>
  <!-- 眼睛 -->
  <rect x="12" y="2" width="2" height="2" fill="#050810"/>
  <rect x="18" y="2" width="2" height="2" fill="#050810"/>
  <rect x="12.5" y="2.5" width="1" height="1" fill="#00e5cc"/>
  <rect x="18.5" y="2.5" width="1" height="1" fill="#00e5cc"/>
  <!-- 触角 -->
  <rect x="11" y="0" width="1" height="2" fill="#ff4f40"/>
  <rect x="20" y="0" width="1" height="2" fill="#ff4f40"/>
  <!-- 左蟹钳 -->
  <rect x="3" y="11" width="6" height="4" fill="#ff4f40"/>
  <rect x="1" y="12" width="4" height="3" fill="#ff4f40"/>
  <rect x="0" y="13" width="2" height="2" fill="#cc2020"/>
  <!-- 右蟹钳 -->
  <rect x="23" y="11" width="6" height="4" fill="#ff4f40"/>
  <rect x="27" y="12" width="4" height="3" fill="#ff4f40"/>
  <rect x="30" y="13" width="2" height="2" fill="#cc2020"/>
  <!-- BB 机（主体） -->
  <rect x="7" y="20" width="18" height="11" rx="2" fill="#1a1a1a" stroke="#3a3a3a" stroke-width="0.5"/>
  <!-- 屏幕 -->
  <rect x="9" y="22" width="12" height="6" rx="1" fill="#d8d8c8"/>
  <rect x="10" y="23" width="5" height="1" fill="#88aa88" opacity="0.6"/>
  <rect x="10" y="25" width="8" height="0.8" fill="#88aa88" opacity="0.6"/>
  <!-- LED -->
  <circle cx="24" cy="28" r="1" fill="#ff3030"/>
  <!-- 天线 -->
  <rect x="15" y="16" width="2" height="5" rx="1" fill="#888"/>
  <!-- 蟹腿 -->
  <rect x="9" y="20" width="2" height="3" fill="#cc2020"/>
  <rect x="21" y="20" width="2" height="3" fill="#cc2020"/>
</svg>
