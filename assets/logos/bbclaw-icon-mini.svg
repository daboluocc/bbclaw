<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Minimal BBClaw icon: 对讲机外形 + 像素龙虾灵魂 -->
  <!-- Antenna -->
  <rect x="14" y="1" width="4" height="8" rx="2" fill="#555"/>
  <!-- Body -->
  <rect x="6" y="8" width="20" height="22" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="0.5"/>
  <!-- Speaker dots -->
  <circle cx="10" cy="13" r="1.2" fill="#444"/>
  <circle cx="10" cy="17" r="1.2" fill="#444"/>
  <circle cx="10" cy="21" r="1.2" fill="#444"/>
  <!-- LED -->
  <circle cx="20" cy="13" r="2.5" fill="#ff4f40"/>
  <!-- PTT button -->
  <rect x="15" y="20" width="8" height="5" rx="2" fill="#ff4f40" opacity="0.9"/>
</svg>
