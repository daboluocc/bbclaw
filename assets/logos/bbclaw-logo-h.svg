<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80">
  <!-- 龙虾 + BB 机 横版 Logo -->
  <!-- 龙虾 -->
  <g transform="translate(0, 0)">
    <!-- 龙虾身体 像素风 -->
    <g fill="#ff4f40">
      <rect x="26" y="8" width="12" height="8"/>
      <rect x="22" y="16" width="20" height="16"/>
      <rect x="20" y="32" width="24" height="12"/>
      <rect x="22" y="44" width="20" height="8"/>
    </g>
    <!-- 深色层次 -->
    <g fill="#cc2020">
      <rect x="22" y="20" width="6" height="10"/>
      <rect x="36" y="20" width="6" height="10"/>
      <rect x="22" y="46" width="6" height="4"/>
      <rect x="36" y="46" width="6" height="4"/>
    </g>
    <!-- 眼睛 -->
    <g fill="#050810">
      <rect x="26" y="8" width="4" height="4"/>
      <rect x="34" y="8" width="4" height="4"/>
    </g>
    <g fill="#00e5cc">
      <rect x="27" y="8" width="2" height="2"/>
      <rect x="35" y="8" width="2" height="2"/>
    </g>
    <!-- 触角 -->
    <g stroke="#ff4f40" stroke-width="2" fill="none" stroke-linecap="round">
      <path d="M26 8 Q20 2 18 4"/>
      <path d="M38 8 Q44 2 46 4"/>
    </g>

    <!-- 左蟹钳 -->
    <g fill="#ff4f40">
      <rect x="6" y="28" width="14" height="8"/>
      <rect x="2" y="30" width="8" height="5"/>
      <rect x="0" y="32" width="4" height="6"/>
    </g>
    <g fill="#cc2020">
      <rect x="6" y="31" width="14" height="3"/>
      <rect x="2" y="33" width="8" height="2"/>
    </g>

    <!-- 右蟹钳 -->
    <g fill="#ff4f40">
      <rect x="44" y="28" width="14" height="8"/>
      <rect x="54" y="30" width="8" height="5"/>
      <rect x="60" y="32" width="4" height="6"/>
    </g>
    <g fill="#cc2020">
      <rect x="44" y="31" width="14" height="3"/>
      <rect x="54" y="33" width="8" height="2"/>
    </g>

    <!-- 蟹腿 -->
    <g fill="#cc2020">
      <rect x="20" y="32" width="4" height="6"/>
      <rect x="40" y="32" width="4" height="6"/>
      <rect x="18" y="38" width="4" height="5"/>
      <rect x="42" y="38" width="4" height="5"/>
    </g>

    <!-- BB 机 — 黑色外壳 -->
    <rect x="56" y="52" width="44" height="28" rx="4" fill="#1a1a1a" stroke="#3a3a3a" stroke-width="1"/>

    <!-- BB 机屏幕 -->
    <rect x="60" y="56" width="30" height="14" rx="2" fill="#e8e8d0"/>

    <!-- 屏幕像素文字 -->
    <g fill="#88aa88" opacity="0.65">
      <rect x="62" y="58" width="10" height="2"/>
      <rect x="74" y="58" width="5" height="2"/>
      <rect x="62" y="61" width="16" height="1.5"/>
      <rect x="62" y="64" width="8" height="1.5"/>
      <rect x="72" y="64" width="6" height="1.5"/>
    </g>

    <!-- BB 机喇叭网 -->
    <g fill="#2a2a2a">
      <rect x="94" y="58" width="4" height="2.5" rx="1"/>
      <rect x="94" y="62" width="4" height="2.5" rx="1"/>
      <rect x="94" y="66" width="4" height="2.5" rx="1"/>
      <rect x="94" y="70" width="4" height="2.5" rx="1"/>
    </g>

    <!-- BB 机 LED -->
    <circle cx="62" cy="74" r="2.5" fill="#ff3030"/>
    <circle cx="62" cy="74" r="1.2" fill="#ffaaaa"/>

    <!-- BB 机按键 -->
    <g fill="#2e2e2e">
      <rect x="66" y="72" width="4" height="5" rx="1.2"/>
      <rect x="72" y="72" width="4" height="5" rx="1.2"/>
      <rect x="78" y="72" width="4" height="5" rx="1.2"/>
      <rect x="84" y="72" width="4" height="5" rx="1.2"/>
    </g>
    <g fill="#444">
      <rect x="67" y="73.5" width="2" height="2.5" rx="0.5"/>
      <rect x="73" y="73.5" width="2" height="2.5" rx="0.5"/>
      <rect x="79" y="73.5" width="2" height="2.5" rx="0.5"/>
      <rect x="85" y="73.5" width="2" height="2.5" rx="0.5"/>
    </g>

    <!-- 天线 -->
    <rect x="76" y="42" width="4" height="12" rx="2" fill="#888"/>
    <rect x="77" y="42" width="2" height="12" rx="1" fill="#aaa"/>

    <!-- 蟹鳌夹住 BB 机顶部 -->
    <g fill="#ff4f40">
      <rect x="58" y="48" width="10" height="5"/>
      <rect x="96" y="48" width="10" height="5"/>
    </g>
    <g fill="#cc2020">
      <rect x="58" y="50" width="10" height="2"/>
      <rect x="96" y="50" width="10" height="2"/>
    </g>
  </g>

  <!-- BBClaw 文字 -->
  <text x="110" y="50" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#1a1a1a" letter-spacing="-0.5">BBClaw</text>
  <text x="110" y="65" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" fill="#666" letter-spacing="0.5">OPENCLAW ECOSYSTEM</text>
</svg>
