<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 32 32" role="img" aria-label="Pixel lobster">
  <rect width="32" height="32" fill="none"/>
  <!-- outline -->
  <g fill="#3a0a0d">
    <rect x="2" y="10" width="2" height="6"/>
    <rect x="4" y="8" width="2" height="2"/>
    <rect x="4" y="16" width="2" height="2"/>
    <rect x="6" y="6" width="2" height="2"/>
    <rect x="6" y="18" width="2" height="2"/>
    <rect x="8" y="4" width="2" height="2"/>
    <rect x="8" y="20" width="2" height="2"/>
    <rect x="10" y="4" width="12" height="2"/>
    <rect x="22" y="4" width="2" height="2"/>
    <rect x="24" y="6" width="2" height="2"/>
    <rect x="24" y="18" width="2" height="2"/>
    <rect x="26" y="8" width="2" height="2"/>
    <rect x="26" y="16" width="2" height="2"/>
    <rect x="28" y="10" width="2" height="6"/>
    <rect x="10" y="22" width="12" height="2"/>
    <rect x="8" y="24" width="2" height="2"/>
    <rect x="22" y="24" width="2" height="2"/>
    <rect x="6" y="26" width="2" height="2"/>
    <rect x="24" y="26" width="2" height="2"/>
