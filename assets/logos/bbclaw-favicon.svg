<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- 龙虾手拿 BB 机 — 像素风 32x32 -->
  <!-- 龙虾身体 -->
  <g fill="#ff4f40">
    <rect x="13" y="2" width="6" height="4"/>
    <rect x="12" y="6" width="8" height="6"/>
    <rect x="11" y="12" width="10" height="5"/>
  </g>
  <!-- 眼睛 -->
  <g fill="#050810">
    <rect x="14" y="2" width="1.5" height="1.5"/>
    <rect x="17" y="2" width="1.5" height="1.5"/>
  </g>
  <g fill="#00e5cc">
    <rect x="14.5" y="2" width="0.8" height="0.8"/>
    <rect x="17.5" y="2" width="0.8" height="0.8"/>
  </g>

  <!-- 左蟹钳夹 BB 机 -->
  <g fill="#ff4f40">
    <rect x="5" y="11" width="6" height="3"/>
    <rect x="2" y="12" width="4" height="3"/>
    <rect x="0" y="13" width="3" height="2"/>
  </g>
  <g fill="#cc2020">
    <rect x="5" y="12.5" width="6" height="1"/>
  </g>

  <!-- 右蟹钳夹 BB 机 -->
  <g fill="#ff4f40">
    <rect x="21" y="11" width="6" height="3"/>
    <rect x="26" y="12" width="4" height="3"/>
    <rect x="29" y="13" width="3" height="2"/>
  </g>
  <g fill="#cc2020">
    <rect x="21" y="12.5" width="6" height="1"/>
  </g>

  <!-- BB 机（黑色小机） -->
  <rect x="7" y="17" width="18" height="13" rx="2" fill="#1a1a1a"/>
  <rect x="7" y="17" width="18" height="13" rx="2" fill="none" stroke="#3a3a3a" stroke-width="0.6"/>
  <!-- 屏幕 -->
  <rect x="9" y="19" width="12" height="6" rx="1" fill="#e8e8d0"/>
  <!-- 屏幕像素点 -->
  <g fill="#88aa88" opacity="0.6">
    <rect x="10" y="20" width="4" height="1"/>
    <rect x="15" y="20" width="2" height="1"/>
    <rect x="10" y="22" width="6" height="0.8"/>
    <rect x="10" y="23.5" width="3" height="0.8"/>
  </g>
  <!-- LED -->
  <circle cx="10.5" cy="27" r="1.2" fill="#ff3030"/>
  <!-- 按键 -->
  <g fill="#2e2e2e">
    <rect x="12" y="28" width="2" height="2" rx="0.5"/>
    <rect x="15" y="28" width="2" height="2" rx="0.5"/>
    <rect x="18" y="28" width="2" height="2" rx="0.5"/>
  </g>
  <!-- 天线 -->
  <rect x="14.5" y="14" width="1.5" height="4" rx="0.75" fill="#888"/>

  <!-- 蟹腿 -->
  <g fill="#cc2020">
    <rect x="11" y="17" width="2" height="2"/>
    <rect x="19" y="17" width="2" height="2"/>
  </g>
</svg>
