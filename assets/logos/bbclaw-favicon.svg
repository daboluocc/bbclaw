<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- 对讲机 favicon: 32x32 适合 tab -->
  <!-- Antenna -->
  <rect x="14" y="1" width="4" height="7" rx="2" fill="#666"/>
  <!-- Body -->
  <rect x="5" y="7" width="22" height="24" rx="4" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="0.5"/>
  <!-- Speaker grille dots -->
  <circle cx="9" cy="12" r="1" fill="#444"/>
  <circle cx="9" cy="16" r="1" fill="#444"/>
  <circle cx="9" cy="20" r="1" fill="#444"/>
  <!-- LED -->
  <circle cx="23" cy="12" r="2.5" fill="#ff4f40"/>
  <!-- PTT button -->
  <rect x="18" y="17" width="6" height="5" rx="2" fill="#ff4f40" opacity="0.85"/>
</svg>
